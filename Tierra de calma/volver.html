<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Volviendo…</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b140f;color:#f3efe6;font-family:system-ui}
    .card{background:#101c15;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px 16px;max-width:420px;text-align:center}
    a{display:inline-block;margin-top:12px;padding:10px 18px;background:#2f6b4f;color:#fff;text-decoration:none;border-radius:999px;font-weight:600}
    .muted{opacity:.8;font-size:13px;margin-top:10px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Volviendo a la tienda…</h2>
    <div class="muted">Si no te redirige automáticamente, elegí:</div>
    <a href="/" id="fallbackLink">Ir al menú</a>
  </div>

  <script>
    // apaga loader si quedó pegado
    try { if (typeof hideLoader === "function") hideLoader(); } catch(e){}

    // Probamos posibles rutas donde podría estar la tienda
    const candidates = [
      "/chocolate/",
      "/chocolate/index.html",
      "/tienda/",
      "/shop/",
      "/" // último fallback (menú)
    ];

    async function exists(url){
      try{
        const r = await fetch(url, { method:"HEAD", cache:"no-store" });
        return r.ok;
      }catch(e){
        return false;
      }
    }

    (async ()=>{
      for(const url of candidates){
        const ok = await exists(url);
        if(ok){
          // replace para no quedar pegado en "volver.html?..."
          try{
            if (window.top && window.top !== window.self) window.top.location.href = url;
            else window.location.replace(url);
          }catch(e){
            window.location.href = url;
          }
          return;
        }
      }
      // fallback total
      document.getElementById("fallbackLink").href = "/";
    })();
  </script>
</body>
</html>
